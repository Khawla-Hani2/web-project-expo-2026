<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXPO IAU | Profile</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="profile.css">
  <link rel="stylesheet" href="menu.css">
</head>

<body class="profile-page" onclick="outsideClick(event)">

  <div id="menu-container"></div>

  <!-- ===== TOP BAR ===== -->
  <div class="top-strip">
    <div class="logoL"><img src="IAU_logo_white.png"></div>

    <div class="seg s1"><img src="user_vector.png"><span id="t1">Sign-up</span></div>
    <div class="seg s2"><img src="Human_Health.png"><span id="t2">Health</span></div>
    <div class="seg s3"><img src="Future_Economies.png"><span id="t3">Economies</span></div>
    <div class="seg s4"><img src="Environmental_Sustainability.png"><span id="t4">Sustainability</span></div>
    <div class="seg s5"><img src="Energy_and_Industry.png"><span id="t5">Energy</span></div>
    <div class="seg s6"><img src="Education_and_Development.png"><span id="t6">Education</span></div>
    <div class="seg s7"><img src="Research_Publications.png"><span id="t7">Research</span></div>

    <div class="logoR">
      <img src="expo2026_en_white.png" id="expoLogo">
    </div>
  </div>

  <!-- ===== SUB BAR ===== -->
  <div class="subbar">
    <div class="menu-btn" onclick="toggleMenu(event)">
      <div></div><div></div><div></div>
    </div>

    <div class="lang-btn" onclick="toggleLang()">
      <img src="lang.png">
    </div>
  </div>

  <!-- ===== MAIN ===== -->
  <div class="container">

    <main class="main-content">

      <!-- PERSONAL INFO -->
      <section class="section-card">
        <h2 class="title" id="title1">Personal Information</h2>

        <div class="form-grid">
          <div class="field">
            <label id="label1">Full Name</label>
            <input type="text" id="nameInput" readonly placeholder="Full Name">
          </div>

          <div class="field">
            <label id="label2">Email Address</label>
            <input type="email" id="emailInput" placeholder="name@iau.edu.sa">
          </div>

          <div class="field">
            <label id="label3">Phone Number</label>
            <input type="text" id="phoneInput" placeholder="05XXXXXXXX">
          </div>
        </div>

        <button class="btn" type="button" id="saveBtn">Save Changes</button>
      </section>

      <!-- SECURITY -->
      <section class="section-card">
        <h2 class="title" id="title2">Account Security</h2>

        <div class="form-grid">
          <div class="field">
            <label id="label4">New Password</label>
            <input type="password" id="newPassword" placeholder="********">
          </div>

          <div class="field">
            <label id="label5">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="********">
          </div>
        </div>

        <button class="btn" type="button" id="updateBtn">Update Password</button>
      </section>

    </main>

    <!-- PROFILE SIDE -->
    <aside class="profile-display">

      <div class="photo-circle" id="photoContainer">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="#cbd5f5">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4
          1.79-4 4 1.79 4 4 4zm0 2c-2.67
          0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>

        <input type="file" id="photoInput" hidden accept="image/*">
        <button class="upload-trigger" id="uploadBtn">Edit</button>
      </div>

      <h1 id="displayName"></h1>

      <div class="role" id="roleBadge"></div>

      <p class="profile-subtext" id="profileText">
        Manage your EXPO IAU profile, update your contact details, and keep your account secure before the exhibition days.
      </p>

    </aside>

  </div>

  <!-- FOOTER -->
  <div class="footer-img">
    <img src="footer.png">
    <div class="footer-text" id="footerText">
      Vice Deanship of Scientific Research and Innovation
    </div>
  </div>

 
  <script src="profile.js"></script>
  <script src="menu.js"></script>

</body>
</html>
