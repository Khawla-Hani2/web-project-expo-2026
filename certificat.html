<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>EXPO 2026 | Certificate</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="certificate.css">

</head>

<body>

<!-- HEADER -->
<div class="top-strip">

  <div class="logoL">
    <img src="IAU_logo_white.png">
  </div>

  <div class="seg s1">
    <img src="user_vector.png">
    <span id="t1">Sign-up</span>
  </div>

  <div class="seg s2">
    <img src="Human_Health.png">
    <span id="t2">Health</span>
  </div>

  <div class="seg s3">
    <img src="Future_Economies.png">
    <span id="t3">Economies</span>
  </div>

  <div class="seg s4">
    <img src="Environmental_Sustainability.png">
    <span id="t4">Sustainability</span>
  </div>

  <div class="seg s5">
    <img src="Energy_and_Industry.png">
    <span id="t5">Energy</span>
  </div>

  <div class="seg s6">
    <img src="Education_and_Development.png">
    <span id="t6">Education</span>
  </div>

  <div class="seg s7">
    <img src="Research_Publications.png">
    <span id="t7">Research</span>
  </div>

  <div class="logoR">
    <img
      src="expo2026_en_white.png"
      id="expoLogo"
    >
  </div>

</div>


<!-- LANGUAGE BUTTON -->
<div class="lang-btn"
onclick="toggleLang()">

  <img src="lang.png">

</div>


<!-- UPLOAD -->
<div class="box">

  <h3 id="uploadTitle">
    Upload Certificate Template
  </h3>

  <input
    type="file"
    id="templateFile"
    accept="image/*"
  >

  <div id="previewContainer">

    <button
      id="removeBtn"
      onclick="removeImage()"
    >
      Delete
    </button>

    <img
      id="previewImage"
      src=""
      alt="Preview"
    >

  </div>

</div>


<!-- CERTIFICATE TYPE -->
<div class="box">

  <h3 id="typeTitle">
    Select Certificate Type
  </h3>

  <div class="option-group">


    <!-- TEAM -->
    <label class="option-card">

      <input
        type="radio"
        name="certificateType"
        value="team"
        checked
      >

      <div class="content">

        <h4 id="teamTitle">
          Team Certificates
        </h4>

        <p id="teamDesc">
          Issue certificates for winning project teams
        </p>

      </div>

    </label>



    <!-- JUDGES -->
    <label class="option-card">

      <input
        type="radio"
        name="certificateType"
        value="judges"
      >

      <div class="content">

        <h4 id="judgeTitle">
          Judges and Supervisors Certificates
        </h4>

        <p id="judgeDesc">
          Issue certificates for judges and academic supervisors
        </p>

      </div>

    </label>

  </div>

</div>


<!-- PROJECTS -->
<div class="box" id="projectsBox">

  <h3 id="winnerTitle">
    
  </h3>

</div>


<!-- RESULT TIME -->
<div class="box">

  <h3 id="timeTitle">
    Set Result Time
  </h3>

  <input
    type="datetime-local"
    id="resultTime"
  >

</div>


<!-- SUBMIT -->
<button
onclick="submitAll()"
id="submitBtn">

  Submit

</button>


<!-- FOOTER -->
<div class="footer-img">

  <img src="footer.png">

  <div
    class="footer-text"
    id="footerText"
  >
    Vice Deanship of Scientific Research and Innovation
  </div>

</div>


<!-- SCRIPT -->
<script src="certificat.js"></script>

</body>
</html>
