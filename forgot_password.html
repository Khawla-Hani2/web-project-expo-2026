<html lang="ar" dir="rtl">

<head><script>

  if(!localStorage.getItem('lang')) localStorage.setItem('lang','ar');

  document.documentElement.dir=l==='ar'?'rtl':'ltr';
})();
</script>
  <meta charset="UTF-8">

</head>

<body>

<!-- HEADER -->
<div class="top-strip">
  <div class="logoL"><img src="IAU_logo_white.png"></div>

  <a href="Signup.html"class= "seg s1"><img src="user_vector.png" ><span id="t1">Sign-up</span></a>
  <a href="human_health.php" class="seg s2"><img src="Human_Health.png"><span id="t2">Health</span></a>
  <a href="future_economics.php" class="seg s3"><img src="Future_Economies.png"><span id="t3">Economies</span></a>
  <a href="sustainability.php" class="seg s4"><img src="Environmental_Sustainability.png"><span id="t4">Sustainability</span></a>
  <a href="energy.php" class="seg s5"><img src="Energy_and_Industry.png"><span id="t5">Energy</span></a>
  <a href="education.php" class="seg s6"><img src="Education_and_Development.png"><span id="t6">Education</span></a>

  <div class="logoR">
    <img src="expo2026_en_white.png" id="expoLogo">
  </div>
</div>

<div class="lang-btn" onclick="toggleLang()">
  <img src="lang.png">
</div>

<div class="page-wrapper">
  <div class="form-box">

    <!-- STEP 1: Enter email-->
    <div id="step1">
      <h2 id="pageTitle">Forgot Password</h2>

      <label id="labelEmail">Email</label>
      <input type="email" id="email" placeholder="name@iau.edu.sa">

      <p id="errorMsg" style="color:red; font-size:13px; display:none;"></p>

      <button type="button" class="submit" id="nextBtn" onclick="checkEmail()">Next</button>
      <button type="button" class="logIn" onclick="location.href='login.html'" id="backBtn">Back to Login</button>
    </div>

    <!-- STEP 2:Enter your Password-->
    <div id="step2" style="display:none;">
      <h2 id="pageTitle2">Reset Password</h2>

      <label id="labelNew">New Password</label>
      <input type="password" id="newPassword">

      <label id="labelConfirm">Confirm Password</label>
      <input type="password" id="confirmPassword">

      <p id="errorMsg2" style="color:red; font-size:13px; display:none;"></p>

      <button type="button" class="submit" id="resetBtn" onclick="resetPassword()">Reset Password</button>
    </div>

  </div>
</div>

<script src="forgot_password.js"></script>

</body>
</html>
